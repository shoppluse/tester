
<div class="store">
  <header class="sh">
    <span class="sb">🛒 ShopForge</span><input class="ss" placeholder="Search products..." data-cfs-selected="1"><button class="cart-btn" id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
  </header>
  <div class="sbody">
    <main class="pgrid" id="pgrid"><div class="pc"><div class="pi">🎧</div><div class="pinfo"><div class="pn">Headphones</div><div class="pp">$129</div><button class="padd" onclick="addCart(1)">Add to Cart</button></div></div><div class="pc"><div class="pi">⌨️</div><div class="pinfo"><div class="pn">Keyboard</div><div class="pp">$219</div><button class="padd" onclick="addCart(2)">Add to Cart</button></div></div><div class="pc"><div class="pi">🖥️</div><div class="pinfo"><div class="pn">Monitor</div><div class="pp">$449</div><button class="padd" onclick="addCart(3)">Add to Cart</button></div></div><div class="pc"><div class="pi">👟</div><div class="pinfo"><div class="pn">Sneakers</div><div class="pp">$89</div><button class="padd" onclick="addCart(4)">Add to Cart</button></div></div><div class="pc"><div class="pi">⌚</div><div class="pinfo"><div class="pn">Watch</div><div class="pp">$299</div><button class="padd" onclick="addCart(5)">Add to Cart</button></div></div><div class="pc"><div class="pi">🧥</div><div class="pinfo"><div class="pn">Jacket</div><div class="pp">$179</div><button class="padd" onclick="addCart(6)">Add to Cart</button></div></div></main>
    <aside class="cart-side" id="cartSide">
      <div class="csh">
        <h3>Your Cart</h3>
        <button onclick="document.getElementById('cartSide').style.transform='translateX(100%)'">✕</button>
      </div>
      <div class="citems" id="citems">
        <p style="color:#94a3b8;text-align:center;padding:20px;">Cart is empty</p>
      </div>
      <div class="cfoot">
        <div class="ctrow"><span>Total</span><strong id="ctotal">$0.00</strong></div>
        <button class="cbtn">Checkout →</button>
      </div>
    </aside>
  </div>
</div>
<div class="store">
  <header class="sh">
    <span class="sb">🛒 ShopForge</span><input class="ss" placeholder="Search products..."><button class="cart-btn" id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
  </header>
  <div class="sbody">
    <main class="pgrid" id="pgrid"></main>
    <aside class="cart-side" id="cartSide">
      <div class="csh">
        <h3>Your Cart</h3>
        <button onclick="document.getElementById('cartSide').style.transform='translateX(100%)'">✕</button>
      </div>
      <div class="citems" id="citems">
        <p style="color:#94a3b8;text-align:center;padding:20px;">Cart is empty</p>
      </div>
      <div class="cfoot">
        <div class="ctrow"><span>Total</span><strong id="ctotal">$0.00</strong></div>
        <button class="cbtn">Checkout →</button>
      </div>
    </aside>
  </div>
</div>
<script>
  (function(){
  var _l=console.log,_w=console.warn,_e=console.error;
  function _s(t,a){window.parent.postMessage({type:'log',lt:t,msg:a.map(x=>x===null?'null':x===undefined?'undefined':typeof x==='object'?JSON.stringify(x):String(x)).join(' ')},'*');}
  console.log=function(){_l.apply(this,arguments);_s('log',[].slice.call(arguments));};
  console.warn=function(){_w.apply(this,arguments);_s('warn',[].slice.call(arguments));};
  console.error=function(){_e.apply(this,arguments);_s('error',[].slice.call(arguments));};
  window.onerror=function(m,u,l){_s('error',[m+' (line '+l+')']);};
})();
</script>
<script>
  try{const prods=[{id:1,n:"Headphones",p:129,e:"🎧"},{id:2,n:"Keyboard",p:219,e:"⌨️"},{id:3,n:"Monitor",p:449,e:"🖥️"},{id:4,n:"Sneakers",p:89,e:"👟"},{id:5,n:"Watch",p:299,e:"⌚"},{id:6,n:"Jacket",p:179,e:"🧥"}];
let cart=[];
const grid=document.getElementById("pgrid");
grid.innerHTML=prods.map(p=>`<div class="pc"><div class="pi">${p.e}</div><div class="pinfo"><div class="pn">${p.n}</div><div class="pp">$${p.p}</div><button class="padd" onclick="addCart(${p.id})">Add to Cart</button></div></div>`).join("");
window.addCart=function(id){const p=prods.find(x=>x.id===id);const ex=cart.find(x=>x.id===id);ex?ex.q++:cart.push({...p,q:1});renderCart();document.getElementById("cartSide").classList.add("open");};
function renderCart(){document.getElementById("cartCount").textContent=cart.reduce((s,x)=>s+x.q,0);const ci=document.getElementById("citems");if(!cart.length){ci.innerHTML='<p style="color:#94a3b8;text-align:center;padding:20px;">Cart is empty</p>';document.getElementById("ctotal").textContent="$0.00";return;}ci.innerHTML=cart.map(i=>`<div class="ci"><span>${i.e} ${i.n} ×${i.q}</span><span style="font-weight:700;color:#6366f1;">$${i.p*i.q}</span></div>`).join("");document.getElementById("ctotal").textContent="$"+cart.reduce((s,x)=>s+x.p*x.q,0).toFixed(2);}
document.getElementById("cartBtn").onclick=()=>document.getElementById("cartSide").classList.toggle("open");}catch(err){console.error(err.message);}
</script>
