<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept Clarifier | Study Buddy</title>
    <style>
        /* CSS Styling */
        :root {
            --primary-color: #6366f1; /* Indigo */
            --primary-hover: #4f46e5;
            --bg-color: #f3f4f6;
            --surface-color: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background-color: var(--surface-color);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 16px;
            font-size: 16px;
            font-family: inherit;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            resize: vertical;
            transition: border-color 0.3s ease;
            margin-bottom: 20px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        /* Output Section */
        #loader {
            display: none;
            text-align: center;
            margin-top: 30px;
            color: var(--primary-color);
            font-weight: 500;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        #output-container {
            display: none;
            margin-top: 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .concept-card {
            background-color: #f8fafc;
            border-left: 5px solid var(--primary-color);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 20px;
        }

        .concept-card h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .concept-card ul {
            padding-left: 20px;
        }

        .concept-card li {
            margin-bottom: 8px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Concept Clarifier</h1>
        <p class="subtitle">Paste any complicated textbook concept below, and I'll make it make sense.</p>

        <textarea id="conceptInput" placeholder="Paste your complex concept, theory, or reading assignment here..."></textarea>
        
        <button id="simplifyBtn" onclick="processConcept()">Simplify & Explain</button>

        <div id="loader">Analyzing and translating into student-friendly terms...</div>

        <div id="output-container">
            <div class="concept-card">
                <h3>1. The Gist (In Plain English)</h3>
                <p id="out-gist"></p>
            </div>

            <div class="concept-card">
                <h3>2. The "Convincing" Analogy</h3>
                <p id="out-analogy"></p>
            </div>

            <div class="concept-card">
                <h3>3. Key Takeaways</h3>
                <ul id="out-takeaways"></ul>
            </div>
        </div>
    </div>

    <script>
        // JavaScript Logic
        function processConcept() {
            const inputTxt = document.getElementById('conceptInput').value.trim();
            const btn = document.getElementById('simplifyBtn');
            const loader = document.getElementById('loader');
            const outputContainer = document.getElementById('output-container');

            if (!inputTxt) {
                alert("Please paste a concept first!");
                return;
            }

            // Hide previous output & show loader
            outputContainer.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;
            btn.innerText = "Processing...";

            // ==========================================
            // API INTEGRATION POINT
            // ==========================================
            // In a real application, you would make an async fetch call here 
            // to an AI API (like Gemini, OpenAI, or Claude) sending the 'inputTxt'.
            // You would ask the AI to return a JSON object with a Gist, an Analogy, 
            // and an array of Takeaways.
            
            // For now, we are simulating a 2-second network request to show you the UI flow.
            setTimeout(() => {
                
                // Simulated AI Response based on whatever they pasted
                const mockResponse = {
                    gist: "This concept boils down to the idea that systems naturally move from order to disorder unless energy is applied to keep them organized.",
                    analogy: "Think of your bedroom. If you do nothing (no energy applied), it naturally gets messy over the week (disorder). To make it clean and organized again, you have to spend energy cleaning it. This is exactly how this concept works in nature.",
                    takeaways: [
                        "Order requires constant energy input.",
                        "Disorder (entropy) is the natural state of closed systems.",
                        "This applies to physics, biology, and even time management!"
                    ]
                };

                // Populate the UI with the response
                document.getElementById('out-gist').innerText = mockResponse.gist;
                document.getElementById('out-analogy').innerText = mockResponse.analogy;
                
                const takeawaysList = document.getElementById('out-takeaways');
                takeawaysList.innerHTML = ''; // Clear old items
                mockResponse.takeaways.forEach(item => {
                    let li = document.createElement('li');
                    li.innerText = item;
                    takeawaysList.appendChild(li);
                });

                // Hide loader, show output, reset button
                loader.style.display = 'none';
                outputContainer.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "Simplify Another Concept";

            }, 2000); // 2000ms = 2 second fake delay
        }
    </script>
</body>
</html>
