<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept Clarifier Pro | Study Buddy</title>
    <style>
        /* Modern CSS Styling */
        :root {
            --primary: #4338ca;
            --primary-light: #6366f1;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-dark: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --accent-bg: #e0e7ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.7;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--surface);
            max-width: 850px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 20px;
            font-size: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            resize: vertical;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            background-color: #fdfdfd;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px var(--accent-bg);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--primary-light);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--text-light);
            cursor: not-allowed;
        }

        /* Output & Loader */
        #loader {
            display: none;
            text-align: center;
            margin-top: 40px;
            color: var(--primary);
            font-weight: 600;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        #output-container {
            display: none;
            margin-top: 40px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-left: 6px solid var(--primary-light);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .section-card h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-card p {
            color: var(--text-dark);
            text-align: justify;
        }

        /* CSS Block Arrows & Flowchart Logic */
        .flow-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        .flow-step {
            background-color: var(--accent-bg);
            color: var(--primary);
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            width: 100%;
            max-width: 500px;
            border: 1px solid #c7d2fe;
        }

        /* The Block Arrow */
        .block-arrow {
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 20px solid var(--primary-light);
            margin: 10px 0;
        }

        .takeaways-list {
            padding-left: 20px;
        }

        .takeaways-list li {
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        @media (max-width: 600px) {
            .container { padding: 25px 15px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Concept Clarifier Pro</h1>
        <p class="subtitle">Detailed breakdowns, visual mapping, and no cut corners.</p>

        <textarea id="conceptInput" placeholder="Paste your massive, complicated textbook concept or lecture notes here..."></textarea>
        
        <button id="simplifyBtn" onclick="processConcept()">Analyze & Explain</button>

        <div id="loader">Mapping logic and generating visual breakdown...</div>

        <div id="output-container">
            
            <div class="section-card">
                <h3>📚 The Complete Breakdown</h3>
                <p id="out-deepdive"></p>
            </div>

            <div class="section-card">
                <h3>🔄 Step-by-Step Logic</h3>
                <p style="color: var(--text-light); margin-bottom: 15px; font-size: 0.95rem;">
                    Here is how the concept flows structurally:
                </p>
                <div class="flow-container" id="out-flow">
                    </div>
            </div>

            <div class="section-card">
                <h3>💡 The "Make it Click" Analogy</h3>
                <p id="out-analogy"></p>
            </div>

            <div class="section-card">
                <h3>🎯 Bottom Line Takeaways</h3>
                <ul class="takeaways-list" id="out-takeaways"></ul>
            </div>

        </div>
    </div>

    <script>
        function processConcept() {
            const inputTxt = document.getElementById('conceptInput').value.trim();
            const btn = document.getElementById('simplifyBtn');
            const loader = document.getElementById('loader');
            const outputContainer = document.getElementById('output-container');

            if (!inputTxt) {
                alert("Please paste a concept first!");
                return;
            }

            // UI Reset for Loading State
            outputContainer.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;
            btn.innerText = "Processing...";

            // ==========================================
            // API INTEGRATION SIMULATION
            // ==========================================
            setTimeout(() => {
                
                // This is the structure you should instruct your AI backend to return:
                const mockResponse = {
                    deepDive: "This concept fundamentally explores how closed systems react to external pressures over time. Rather than looking at isolated incidents, it requires us to understand that every action triggers a systemic re-balancing. We are not skipping details here: the core mathematical principle relies on the fact that variables A and B are inversely proportional. When external force (Pressure) increases, internal stability (Volume) decreases to maintain the system's constant energy state.",
                    
                    // The AI returns an array of logical steps to be mapped with arrows
                    flowSteps: [
                        "1. An external pressure is applied to the system.",
                        "2. The system's internal boundaries compress.",
                        "3. Energy density increases as space decreases.",
                        "4. A new state of equilibrium is reached."
                    ],
                    
                    analogy: "Imagine squeezing a balloon. The air inside doesn't disappear (the energy remains constant), but as you apply pressure with your hands, the space inside gets smaller, and the rubber stretches tighter. If you squeeze too hard without letting air out, it pops.",
                    
                    takeaways: [
                        "Systems always seek a state of equilibrium.",
                        "Internal volume and external pressure are inversely linked.",
                        "The total energy of the closed system remains mathematically constant."
                    ]
                };

                // 1. Populate Deep Dive
                document.getElementById('out-deepdive').innerText = mockResponse.deepDive;

                // 2. Populate Visual Flow with Block Arrows
                const flowContainer = document.getElementById('out-flow');
                flowContainer.innerHTML = ''; // clear old flow
                
                mockResponse.flowSteps.forEach((step, index) => {
                    // Create the step box
                    let stepBox = document.createElement('div');
                    stepBox.className = 'flow-step';
                    stepBox.innerText = step;
                    flowContainer.appendChild(stepBox);

                    // Add a CSS block arrow after it (unless it's the very last step)
                    if (index < mockResponse.flowSteps.length - 1) {
                        let arrow = document.createElement('div');
                        arrow.className = 'block-arrow';
                        flowContainer.appendChild(arrow);
                    }
                });

                // 3. Populate Analogy
                document.getElementById('out-analogy').innerText = mockResponse.analogy;
                
                // 4. Populate Takeaways
                const takeawaysList = document.getElementById('out-takeaways');
                takeawaysList.innerHTML = ''; // clear old
                mockResponse.takeaways.forEach(item => {
                    let li = document.createElement('li');
                    li.innerText = item;
                    takeawaysList.appendChild(li);
                });

                // Display Results
                loader.style.display = 'none';
                outputContainer.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "Explain Another Concept";

            }, 2500); // 2.5 second delay
        }
    </script>
</body>
</html>
