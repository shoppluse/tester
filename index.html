<script>
  (function() {
        const _log = console.log, _warn = console.warn, _error = console.error;
        function send(type, args) {
            window.parent.postMessage({ type:'console', logType:type, message:args.map(a => {
                if(a===null) return 'null';
                if(a===undefined) return 'undefined';
                if(typeof a==='object') { try{return JSON.stringify(a);}catch(e){return String(a);} }
                return String(a);
            }).join(' ') }, '*');
        }
        console.log = (...a) => { _log(...a); send('log',a); };
        console.warn = (...a) => { _warn(...a); send('warn',a); };
        console.error = (...a) => { _error(...a); send('error',a); };
        window.onerror = (msg,url,line) => send('error',[msg+' (line '+line+')']);
    })();
</script>
<script>
  try { console.log('Ready to build!'); } catch(err) { console.error(err.message); }
</script>

<style>
  #cf-builder-ui {
    position: fixed;
    top: 12px;
    right: 12px;
    background: rgba(15, 23, 42, 0.95);
    color: #f8fafc;
    padding: 12px;
    border-radius: 8px;
    z-index: 999999;
    font-family: system-ui, sans-serif;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    width: 280px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  #cf-builder-ui button {
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    background: #334155;
    color: white;
    border: none;
    border-radius: 4px;
    transition: 0.2s;
  }

  #cf-builder-ui button:hover {
    background: #475569;
  }

  #cf-builder-ui .danger-btn {
    background: #ef4444;
  }

  #cf-builder-ui .danger-btn:hover {
    background: #dc2626;
  }

  #cf-builder-ui input[type="color"] {
    padding: 0;
    border: 1px solid #475569;
    border-radius: 4px;
    height: 26px;
    width: 30px;
    cursor: pointer;
  }

  .cf-selected-element {
    outline: 3px dashed #6366f1 !important;
    outline-offset: -2px;
  }
</style>

<script>
  let selectedEl = null;

        document.body.contentEditable = "true";
        document.getElementById('cf-builder-ui').contentEditable = "false";

        document.addEventListener("click", e => {
            if (e.target.closest("#cf-builder-ui")) return;
            if (e.target.closest("a")) e.preventDefault(); // Prevent navigating away

            if (selectedEl) selectedEl.classList.remove("cf-selected-element");
            selectedEl = e.target;
            selectedEl.classList.add("cf-selected-element");
        });

        window.addEl = function(tag) {
            const target = selectedEl || document.body;
            const el = document.createElement(tag);
            el.textContent = "New " + tag;
            if (tag === 'div') { 
                el.style.padding = '20px'; 
                el.style.minHeight = '50px';
                el.style.border = '1px dashed #ccc'; 
            }
            target.appendChild(el);
        };

        window.changeStyle = function(prop, val) {
            if (selectedEl) selectedEl.style[prop] = val;
        };

        window.deleteEl = function() {
            if (selectedEl && selectedEl !== document.body) {
                selectedEl.remove();
                selectedEl = null;
            } else {
                alert("Please select an element inside the page (cannot delete body).");
            }
        };

        let syncTimeout;
        const observer = new MutationObserver(() => {
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                // Clone body to strip builder UI & selection artifacts before sending to Monaco
                const clone = document.body.cloneNode(true);
                const ui = clone.querySelector('#cf-builder-ui');
                if(ui) ui.remove();
                
                clone.querySelectorAll('.cf-selected-element').forEach(el => el.classList.remove('cf-selected-element'));

                window.parent.postMessage({
                    type: 'sync-html',
                    html: clone.innerHTML
                }, '*');
            }, 400); // Debounce to prevent lag
        });

        observer.observe(document.body, { 
            childList: true, characterData: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] 
        });
        console.log("🎨 Visual Builder active. Click elements to edit, text is editable.");
</script>
