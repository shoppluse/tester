<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="system-header">
        <h1>SYS_STATUS: <span class="status-good">ONLINE</span></h1>
        <nav aria-label="System Navigation">
            <ul>
                <li><button type="button" class="nav-btn" aria-current="page">Terminal</button></li>
                <li><button type="button" class="nav-btn">Logs</button></li>
                <li><button type="button" class="nav-btn">Network</button></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <div class="dashboard-grid">
            <section class="panel terminal-panel" aria-labelledby="terminal-heading">
                <h2 id="terminal-heading" class="sr-only">System Terminal</h2>
                
                <div id="terminal-output" class="terminal-output" aria-live="polite">
                    <p class="system-msg">[SYSTEM INITIALIZED] Welcome to Core-OS v4.11.</p>
                    <p class="system-msg">Type 'help' to view available diagnostic commands.</p>
                </div>

                <form id="terminal-form" class="terminal-input-area">
                    <label for="terminal-input" class="prompt-label"><span aria-hidden="true">guest@node:~#</span><span class="sr-only">Enter command:</span></label>
                    <input type="text" id="terminal-input" autocomplete="off" autofocus required>
                    <button type="submit" class="sr-only">Execute Command</button>
                </form>
            </section>

            <section class="panel metrics-panel" aria-labelledby="metrics-heading">
                <h2 id="metrics-heading">System Diagnostics</h2>
                <ul class="metrics-list">
                    <li>
                        <span class="metric-label">CPU Load:</span>
                        <div class="progress-bar-container">
                            <div class="progress-bar" role="progressbar" aria-valuenow="42" aria-valuemin="0" aria-valuemax="100" style="width: 42%;"></div>
                        </div>
                        <span class="metric-value">42%</span>
                    </li>
                    <li>
                        <span class="metric-label">Firewall Integrity:</span>
                        <span class="metric-value status-good">SECURE</span>
                    </li>
                    <li>
                        <span class="metric-label">Node Latency:</span>
                        <span class="metric-value">14ms</span>
                    </li>
                </ul>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
