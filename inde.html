<!DOCTYPE html>
<html>

<head>

  <title>Dark Mode Project</title>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:white;
      transition:0.5s;
      font-family:Arial;
    }

    .container{
      text-align:center;
    }

    h1{
      font-size:50px;
      color:black;
      transition:0.5s;
    }

    button{
      padding:15px 30px;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      background:black;
      color:white;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.1);
    }

    .dark{
      background:#111;
    }

    .dark h1{
      color:white;
    }

    .dark button{
      background:white;
      color:black;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1 id="text">
      ☀ Light Mode
    </h1>

    <button onclick="toggleMode()">
      Change Mode
    </button>

  </div>

  <script>

    let darkMode = false;

    function toggleMode(){

      document.body.classList.toggle("dark");

      if(darkMode){

        document.getElementById("text")
        .innerHTML = "☀ Light Mode";

      }
      else{

        document.getElementById("text")
        .innerHTML = "🌙 Dark Mode";

      }

      darkMode = !darkMode;
    }

  </script>

</body>

</html>
